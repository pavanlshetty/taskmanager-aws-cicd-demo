name: CI/CD Pipeline

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy from'
        required: true
        default: 'main'
        type: choice
        options:
        - main
        - develop
        - staging

env:
  TF_VERSION: '1.5.0'
  ANSIBLE_VERSION: '2.15'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: ${{ inputs.branch }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./docker/Dockerfile
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/taskmanager-app:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    env:
      KEY_NAME: ${{ secrets.KEY_NAME }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: ${{ inputs.branch }}

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ env.TF_VERSION }}

    - name: Terraform Init
      working-directory: ./terraform
      run: terraform init

    - name: Terraform Plan
      working-directory: ./terraform
      run: terraform plan -var="key_name=$KEY_NAME" -out=tfplan

    - name: Terraform Apply
      working-directory: ./terraform
      run: terraform apply -auto-approve tfplan

    - name: Get Terraform outputs
      working-directory: ./terraform
      run: |
        echo "EC2_PUBLIC_IP=$(terraform output -raw ec2_public_ip)" >> $GITHUB_ENV

    - name: Setup Ansible
      run: |
        pip install ansible>=${{ env.ANSIBLE_VERSION }}
        ansible-galaxy collection install community.docker

    - name: Create Ansible inventory
      run: |
        echo "[web]" > ansible/inventory.ini
        echo "${{ env.EC2_PUBLIC_IP }} ansible_user=ubuntu ansible_ssh_private_key_file=/tmp/ssh_key" >> ansible/inventory.ini

    - name: Setup SSH key
      run: |
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/ssh_key
        chmod 600 /tmp/ssh_key

    - name: Run Ansible playbook
      working-directory: ./ansible
      run: |
        ansible-playbook -i inventory.ini playbook.yml --extra-vars "docker_image=${{ secrets.DOCKER_USERNAME }}/taskmanager-app:latest"

    - name: Output deployment URL
      run: |
        echo "Application deployed at: http://${{ env.EC2_PUBLIC_IP }}:5000"
