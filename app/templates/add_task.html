{% extends 'base.html' %}

{% block content %}
<div class="form-page">
  <div class="form-card">
    <div class="form-header">
      <h2>➕ Add New Task</h2>
      <a href="{{ url_for('index') }}" class="btn btn-secondary">← Back</a>
    </div>

    <form method="POST" action="{{ url_for('add_task') }}">
      <div class="form-group">
        <label for="title">Task Title <span class="required">*</span></label>
        <input type="text" id="title" name="title" class="form-control"
               placeholder="e.g. Complete Flask assignment" required />
      </div>

      <div class="form-group">
        <label for="description">Description</label>
        <textarea id="description" name="description" class="form-control"
                  rows="4" placeholder="Optional: describe the task in detail..."></textarea>
      </div>

      <div class="form-row">
        <div class="form-group half">
          <label for="priority">Priority</label>
          <select id="priority" name="priority" class="form-control">
            <option value="Low">🟢 Low</option>
            <option value="Medium" selected>🟡 Medium</option>
            <option value="High">🔴 High</option>
          </select>
        </div>

        <div class="form-group half">
          <label for="due_date">Due Date</label>
          <input type="date" id="due_date" name="due_date" class="form-control" />
        </div>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn-primary btn-lg">✅ Add Task</button>
        <a href="{{ url_for('index') }}" class="btn btn-secondary btn-lg">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
